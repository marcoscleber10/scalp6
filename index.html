<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoNews Pro - Agregador</title>
    
    <!-- Tailwind CSS (Estilização) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gray: { 850: '#1f2937', 950: '#030712' }
                    }
                }
            }
        }
    </script>
    
    <!-- Alpine.js (Lógica/Reatividade) -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- Ícones (Phosphor Icons) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        [x-cloak] { display: none !important; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-black text-gray-100 font-sans antialiased transition-colors duration-300"
      x-data="cryptoNews()"
      x-init="initApp()">

    <!-- ================= HEADER ================= -->
    <header class="sticky top-0 z-50 bg-gray-900/95 backdrop-blur-md border-b border-gray-800">
        <div class="max-w-6xl mx-auto px-4 py-3">
            <div class="flex items-center justify-between">
                <!-- Logo -->
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-blue-600 to-purple-600 flex items-center justify-center shadow-lg shadow-blue-500/20">
                        <i class="ph-bold ph-trend-up text-white text-xl"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold tracking-tight">CryptoNews <span class="text-blue-500">Pro</span></h1>
                        <p class="text-[10px] text-gray-500 font-mono uppercase tracking-wider">Agregador em Tempo Real</p>
                    </div>
                </div>

                <!-- Botões de Ação -->
                <div class="flex items-center gap-2">
                    <!-- Toggle View (Feed vs Headlines) -->
                    <button @click="view = view === 'feed' ? 'headlines' : 'feed'"
                            class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium transition-all"
                            :class="view === 'headlines' ? 'bg-purple-600 text-white shadow-lg shadow-purple-500/25' : 'bg-gray-800 text-gray-400 hover:bg-gray-700'">
                        <i class="ph-bold" :class="view === 'feed' ? 'ph-newspaper' : 'ph-list-dashes'"></i>
                        <span x-text="view === 'feed' ? 'Manchetes IA' : 'Feed'"></span>
                    </button>

                    <!-- Dark Mode Toggle -->
                    <button @click="toggleTheme()" class="w-10 h-10 rounded-lg bg-gray-800 hover:bg-gray-700 flex items-center justify-center transition-colors text-yellow-400">
                        <i class="ph-fill" :class="isDark ? 'ph-moon-stars' : 'ph-sun'"></i>
                    </button>
                </div>
            </div>

            <!-- Barra de Filtros (Apenas no Feed) -->
            <div x-show="view === 'feed'" x-transition class="flex gap-2 mt-4 overflow-x-auto scrollbar-hide pb-1">
                <template x-for="cat in categories" :key="cat.id">
                    <button @click="filterCategory = cat.id"
                            class="px-4 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap transition-all border"
                            :class="filterCategory === cat.id 
                                ? cat.activeClass 
                                : 'bg-gray-800 text-gray-400 border-gray-700 hover:border-gray-500'">
                        <span x-text="cat.icon"></span>
                        <span x-text="cat.label"></span>
                    </button>
                </template>
            </div>
        </div>
    </header>

    <!-- ================= CONTEÚDO PRINCIPAL ================= -->
    <main class="max-w-6xl mx-auto px-4 py-6 min-h-screen">
        
        <!-- Loading State -->
        <div x-show="loading" class="flex flex-col items-center justify-center py-20 text-gray-500">
            <i class="ph-bold ph-spinner animate-spin text-4xl mb-4 text-blue-500"></i>
            <p>Buscando notícias globais...</p>
        </div>

        <!-- Mensagem de Erro -->
        <div x-show="error && !loading" class="mb-4 p-4 bg-red-500/10 border border-red-500/30 rounded-lg text-red-400 text-sm flex items-center gap-2">
            <i class="ph-bold ph-warning-circle text-lg"></i>
            <span x-text="error"></span>
        </div>

        <!-- VISTA: FEED DE NOTÍCIAS -->
        <div x-show="view === 'feed' && !loading" x-cloak class="grid grid-cols-1 gap-4">
            <template x-for="news in filteredNews" :key="news.id">
                <a :href="news.url" target="_blank" class="group block bg-gray-900/40 border border-gray-800 rounded-xl overflow-hidden hover:border-blue-500/50 hover:bg-gray-800/50 transition-all duration-200 relative">
                    
                    <!-- Tag de Score (HOT) -->
                    <div x-show="news.score >= 10" class="absolute top-4 right-4 bg-orange-500/20 text-orange-400 border border-orange-500/30 text-[10px] font-bold px-2 py-1 rounded-md z-10 flex items-center gap-1">
                        <i class="ph-fill ph-fire"></i> HOT
                    </div>

                    <div class="flex flex-col sm:flex-row">
                        <!-- Thumbnail -->
                        <div class="w-full sm:w-48 h-48 sm:h-auto relative shrink-0 bg-gray-800">
                            <img :src="news.image || 'https://placehold.co/400x300/111/444?text=Crypto'" 
                                 alt="News Image"
                                 class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"
                                 @error="$event.target.style.display='none'">
                        </div>
                        
                        <!-- Conteúdo -->
                        <div class="p-5 flex flex-col justify-between flex-1">
                            <div>
                                <!-- Metadados -->
                                <div class="flex items-center gap-2 mb-3">
                                    <span class="px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider"
                                          :class="news.categoryColors">
                                        <span x-text="news.categoryLabel"></span>
                                    </span>
                                    <span class="text-gray-500 text-xs flex items-center gap-1">
                                        <i class="ph ph-clock"></i>
                                        <span x-text="timeAgo(news.date)"></span>
                                    </span>
                                </div>

                                <!-- Título -->
                                <h2 class="text-lg font-bold text-gray-100 group-hover:text-blue-400 transition-colors mb-2 leading-tight"
                                    x-text="news.title"></h2>
                                
                                <!-- Descrição (Opcional) -->
                                <p x-show="news.desc" class="text-sm text-gray-400 line-clamp-2 mb-4"
                                   x-text="news.desc"></p>
                            </div>

                            <!-- Rodapé do Card -->
                            <div class="flex items-center justify-between mt-auto pt-3 border-t border-gray-800/50">
                                <span class="text-xs font-semibold text-gray-300 flex items-center gap-1">
                                    <i class="ph-bold ph-broadcast"></i>
                                    <span x-text="news.source"></span>
                                </span>
                                <span class="text-xs text-blue-500 font-medium flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                    Ler Original <i class="ph-bold ph-arrow-right"></i>
                                </span>
                            </div>
                        </div>
                    </div>
                </a>
            </template>

            <!-- Empty State -->
            <div x-show="filteredNews.length === 0" class="text-center py-12 text-gray-500">
                <i class="ph-duotone ph-magnifying-glass text-4xl mb-3"></i>
                <p>Nenhuma notícia encontrada para esta categoria.</p>
            </div>
        </div>

        <!-- VISTA: MANCHETES PARA IA -->
        <div x-show="view === 'headlines' && !loading" x-cloak class="max-w-4xl mx-auto">
            <div class="flex items-center justify-between mb-6">
                <div>
                    <h2 class="text-2xl font-bold text-white mb-1">🤖 Painel de Manchetes</h2>
                    <p class="text-sm text-gray-400">Copie títulos limpos para gerar imagens ou textos com IA.</p>
                </div>
                <div class="flex gap-2">
                    <button @click="refreshNews()" class="p-2 rounded-lg bg-gray-800 hover:bg-gray-700 text-gray-400 transition-colors" title="Atualizar">
                        <i class="ph-bold ph-arrows-clockwise" :class="{'animate-spin': loading}"></i>
                    </button>
                </div>
            </div>

            <!-- Ações Rápidas -->
            <div class="flex gap-3 mb-6">
                <button @click="copyAllTitles()" class="flex-1 bg-green-600 hover:bg-green-700 text-white py-3 rounded-lg font-semibold text-sm flex items-center justify-center gap-2 transition-colors shadow-lg shadow-green-500/10">
                    <i class="ph-bold ph-copy"></i> Copiar Tudo
                </button>
                <button @click="generatePrompt()" class="flex-1 bg-purple-600 hover:bg-purple-700 text-white py-3 rounded-lg font-semibold text-sm flex items-center justify-center gap-2 transition-colors shadow-lg shadow-purple-500/10">
                    <i class="ph-bold ph-magic-wand"></i> Gerar Prompt IA
                </button>
            </div>

            <!-- Lista de Manchetes -->
            <div class="bg-gray-900/50 border border-gray-800 rounded-xl p-6">
                <div class="space-y-6">
                    <template x-for="group in groupedHeadlines" :key="group.cat">
                        <div class="space-y-2">
                            <h3 class="text-xs font-bold uppercase tracking-widest text-gray-500 border-b border-gray-800 pb-2 mb-3">
                                <span x-text="group.icon"></span>
                                <span x-text="group.label"></span>
                            </h3>
                            <template x-for="(item, index) in group.items" :key="index">
                                <div @click="copySingle(item.title)" 
                                     class="group flex items-start gap-3 p-2 rounded hover:bg-gray-800/50 cursor-pointer transition-colors"
                                     title="Clique para copiar">
                                    <span class="text-gray-600 font-mono mt-0.5 text-xs" x-text="index + 1 + '.'"></span>
                                    <span class="text-sm text-gray-300 group-hover:text-white transition-colors flex-1" x-text="item.title"></span>
                                    <i class="ph ph-copy text-gray-600 opacity-0 group-hover:opacity-100 transition-opacity"></i>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </div>
            
            <!-- Feedback Toast -->
            <div x-show="toast.visible" x-transition 
                 class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-white text-black px-6 py-3 rounded-full shadow-xl font-medium text-sm z-50 flex items-center gap-2">
                <i class="ph-fill ph-check-circle text-green-600"></i>
                <span x-text="toast.message"></span>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="border-t border-gray-800 py-6 mt-auto text-center">
        <p class="text-xs text-gray-600">
            CryptoNews Pro &copy; 2026 • Atualização automática a cada 15min • Dados simulados para demonstração
        </p>
    </footer>

    <!-- ================= LÓGICA JAVASCRIPT ================= -->
    <script>
        function cryptoNews() {
            return {
                view: 'feed', // 'feed' ou 'headlines'
                isDark: true,
                loading: false,
                error: null,
                news: [],
                filterCategory: 'all',
                toast: { visible: false, message: '' },
                
                // Configuração das Categorias
                categories: [
                    { id: 'all', label: 'Todas', icon: '', activeClass: 'bg-gray-100 text-gray-900 border-gray-100' },
                    { id: 'crypto', label: 'Cripto', icon: '🟡', activeClass: 'bg-yellow-500 text-black border-yellow-500' },
                    { id: 'macro', label: 'Macro', icon: '🔵', activeClass: 'bg-blue-500 text-white border-blue-500' },
                    { id: 'politics', label: 'Política', icon: '', activeClass: 'bg-red-500 text-white border-red-500' }
                ],

                // Inicialização
                initApp() {
                    // Carregar tema salvo
                    if (localStorage.getItem('theme') === 'light') {
                        this.isDark = false;
                        document.documentElement.classList.remove('dark');
                    }
                    
                    // Carregar notícias (Cache ou Fetch)
                    this.loadNews();
                    
                    // Auto-refresh a cada 15 min
                    setInterval(() => this.loadNews(), 15 * 60 * 1000);
                },

                // Alternar Tema
                toggleTheme() {
                    this.isDark = !this.isDark;
                    if (this.isDark) {
                        document.documentElement.classList.add('dark');
                        localStorage.setItem('theme', 'dark');
                    } else {
                        document.documentElement.classList.remove('dark');
                        localStorage.setItem('theme', 'light');
                    }
                },

                // Lógica de Carregamento de Notícias
                async loadNews() {
                    this.loading = true;
                    this.error = null;
                    
                    try {
                        // SIMULAÇÃO DE DADOS (Para funcionar sem API Key imediatamente)
                        // Para produção, substitua por fetch real às APIs
                        const simulatedData = await this.fetchSimulatedData();
                        
                        // Processamento e Scoring
                        this.news = this.processNews(simulatedData);
                        
                    } catch (e) {
                        this.error = "Falha ao buscar notícias. Verifique sua conexão.";
                    } finally {
                        this.loading = false;
                    }
                },

                refreshNews() {
                    this.loadNews();
                },

                // Gera dados fictícios realistas para demonstração
                async fetchSimulatedData() {
                    return new Promise(resolve => {
                        setTimeout(() => {
                            const now = new Date();
                            const data = [
                                {
                                    id: 1,
                                    title: "Bitcoin supera US$ 72.000 com entrada massiva de ETFs spot",
                                    desc: "Institucionais compram aggressively enquanto o Fed sinaliza corte de juros.",
                                    source: "CoinDesk",
                                    image: "https://images.unsplash.com/photo-1518546305927-5a555bb7020d?auto=format&fit=crop&w=500&q=80",
                                    category: "crypto",
                                    date: new Date(now - 1000 * 60 * 30).toISOString(), // 30 min atrás
                                    url: "#"
                                },
                                {
                                    id: 2,
                                    title: "Fed surpreende mercados e mantém taxas inalteradas por mais um trimestre",
                                    desc: "Jerome Powell cita inflação persistente como motivo para cautela.",
                                    source: "Bloomberg",
                                    image: "https://images.unsplash.com/photo-1611974765270-ca1258634369?auto=format&fit=crop&w=500&q=80",
                                    category: "macro",
                                    date: new Date(now - 1000 * 60 * 60 * 2).toISOString(), // 2h atrás
                                    url: "#"
                                },
                                {
                                    id: 3,
                                    title: "Ethereum atinge novo recorde de transações diárias na camada 2",
                                    desc: "Solana e Layer 2s competem ferozmente por taxas mais baixas.",
                                    source: "Decrypt",
                                    image: "https://images.unsplash.com/photo-1622630998477-20aa696ecb05?auto=format&fit=crop&w=500&q=80",
                                    category: "crypto",
                                    date: new Date(now - 1000 * 60 * 60 * 5).toISOString(),
                                    url: "#"
                                },
                                {
                                    id: 4,
                                    title: "Presidente dos EUA anuncia nova regulação severa para stablecoins",
                                    desc: "Mercado reage com volatilidade às novas propostas legislativas.",
                                    source: "Reuters",
                                    image: "https://images.unsplash.com/photo-1529107386315-e1a2ed48a620?auto=format&fit=crop&w=500&q=80",
                                    category: "politics",
                                    date: new Date(now - 1000 * 60 * 60 * 1).toISOString(),
                                    url: "#"
                                },
                                {
                                    id: 5,
                                    title: "NFTs de arte digital batem recorde de vendas em leilão histórico",
                                    desc: "Colecionadores tradicionais entram no mercado de tokens não fungíveis.",
                                    source: "ArtNews",
                                    image: "https://images.unsplash.com/photo-1634973357973-f5ed193573f0?auto=format&fit=crop&w=500&q=80",
                                    category: "crypto",
                                    date: new Date(now - 1000 * 60 * 60 * 8).toISOString(),
                                    url: "#"
                                }
                            ];
                            resolve(data);
                        }, 800); // Delay artificial de 800ms
                    });
                },

                // Calcula Score e Formata Dados
                processNews(rawNews) {
                    return rawNews.map(item => {
                        let score = 0;
                        const titleLower = item.title.toLowerCase();
                        
                        // Lógica de Score
                        if (titleLower.includes('bitcoin') || titleLower.includes('btc')) score += 3;
                        if (titleLower.includes('fed') || titleLower.includes('juros')) score += 5;
                        if (titleLower.includes('crash') || titleLower.includes('recorde')) score += 4;
                        if (titleLower.includes('etf')) score += 3;
                        
                        // Recência
                        const hours = (new Date() - new Date(item.date)) / 36e5;
                        if (hours < 2) score += 5;
                        else if (hours < 6) score += 2;

                        // Cores e Labels
                        const catMap = {
                            'crypto': { label: 'Cripto', color: 'bg-yellow-500/20 text-yellow-400 border-yellow-500/30' },
                            'macro': { label: 'Macro', color: 'bg-blue-500/20 text-blue-400 border-blue-500/30' },
                            'politics': { label: 'Política', color: 'bg-red-500/20 text-red-400 border-red-500/30' }
                        };

                        return {
                            ...item,
                            score,
                            categoryLabel: catMap[item.category]?.label || 'Geral',
                            categoryColors: catMap[item.category]?.color || 'bg-gray-500/20 text-gray-400'
                        };
                    }).sort((a, b) => b.score - a.score); // Ordena por score
                },

                // Filtragem Computada
                get filteredNews() {
                    if (this.filterCategory === 'all') return this.news;
                    return this.news.filter(n => n.category === this.filterCategory);
                },

                // Agrupamento para Headlines
                get groupedHeadlines() {
                    const groups = {
                        'crypto': { label: ' Cripto', items: [] },
                        'macro': { label: '🔵 Macro & Economia', items: [] },
                        'politics': { label: '🔴 Política & Regulação', items: [] }
                    };
                    
                    this.news.forEach(n => {
                        if (groups[n.category]) groups[n.category].items.push(n);
                    });
                    
                    // Retorna apenas grupos com itens
                    return Object.entries(groups)
                        .filter(([_, g]) => g.items.length > 0)
                        .map(([key, g]) => ({ cat: key, ...g }));
                },

                // Helpers
                timeAgo(dateString) {
                    const date = new Date(dateString);
                    const now = new Date();
                    const seconds = Math.floor((now - date) / 1000);
                    if (seconds < 60) return 'Agora mesmo';
                    const minutes = Math.floor(seconds / 60);
                    if (minutes < 60) return `${minutes}min atrás`;
                    const hours = Math.floor(minutes / 60);
                    if (hours < 24) return `${hours}h atrás`;
                    return `${Math.floor(hours/24)}d atrás`;
                },

                copySingle(text) {
                    navigator.clipboard.writeText(text);
                    this.showToast('Manchete copiada!');
                },

                copyAllTitles() {
                    const text = this.news.map((n, i) => `${i+1}. ${n.title}`).join('\n');
                    navigator.clipboard.writeText(text);
                    this.showToast(`${this.news.length} manchetes copiadas!`);
                },

                generatePrompt() {
                    const cryptoTitles = this.news.filter(n => n.category === 'crypto').slice(0, 3).map(n => `• ${n.title}`).join('\n');
                    const macroTitles = this.news.filter(n => n.category === 'macro').slice(0, 3).map(n => `• ${n.title}`).join('\n');
                    
                    const prompt = `🚨 BREAKING NEWS - CRIPTO & MERCADO\n\n🟡 CRIPTO:\n${cryptoTitles || '• Sem notícias'}\n\n🔵 MACROECONOMIA:\n${macroTitles || '• Sem notícias'}\n\n🎨 Estilo: Moderno, financeiro, cores escuras, destaque para Bitcoin e mercado global.`;
                    
                    navigator.clipboard.writeText(prompt);
                    this.showToast('Prompt para IA gerado e copiado!');
                },

                showToast(msg) {
                    this.toast.message = msg;
                    this.toast.visible = true;
                    setTimeout(() => this.toast.visible = false, 3000);
                }
            }
        }
    </script>
</body>
</html>
