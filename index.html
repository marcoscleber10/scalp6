<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CryptoNews Pro • Agregador Financeiro</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          animation: { 'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite' }
        }
      }
    }
  </script>
  
  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.5/dist/cdn.min.js"></script>
  
  <!-- Ícones -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <style>
    [x-cloak] { display: none !important; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .breaking-banner { background: linear-gradient(90deg, #dc2626, #b91c1c, #dc2626); background-size: 200% 100%; animation: gradient 3s ease infinite; }
    @keyframes gradient { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
    .fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>

<body class="bg-black text-gray-100 font-sans antialiased transition-colors duration-300"
      x-data="cryptoNewsApp()"
      x-init="init()"
      @keydown.ctrl.k.prevent="showSearch = !showSearch"
      @keydown.escape="showSearch = false">

  <!-- ================= MODAL: CONFIG API KEYS ================= -->
  <div x-show="!hasValidKeys" x-cloak class="fixed inset-0 z-[100] bg-black/90 flex items-center justify-center p-4">
    <div class="bg-gray-900 border border-gray-700 rounded-2xl p-6 max-w-lg w-full shadow-2xl">
      <div class="flex items-center gap-3 mb-6">
        <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-blue-600 to-purple-600 flex items-center justify-center">
          <i class="ph-bold ph-key text-white text-xl"></i>
        </div>
        <div>
          <h2 class="text-xl font-bold">Configurar APIs</h2>
          <p class="text-sm text-gray-400">Insira suas chaves para ativar dados reais</p>
        </div>
      </div>
      
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1">NewsAPI Key</label>
          <input type="password" x-model="apiKeys.newsapi" 
                 class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                 placeholder="Obtenha em newsapi.org">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1">CryptoPanic Key (opcional)</label>
          <input type="password" x-model="apiKeys.cryptopanic" 
                 class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                 placeholder="Obtenha em cryptopanic.com/developers">
        </div>
      </div>
      
      <div class="mt-6 flex gap-3">
        <button @click="saveKeys()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition-colors">
          Salvar e Continuar
        </button>
        <button @click="useDemoMode()" class="px-4 py-3 bg-gray-800 hover:bg-gray-700 rounded-lg text-gray-300 transition-colors">
          Modo Demo
        </button>
      </div>
    </div>
  </div>

  <!-- ================= HEADER ================= -->
  <header class="sticky top-0 z-50 bg-gray-900/95 backdrop-blur-md border-b border-gray-800">
    <div class="max-w-7xl mx-auto px-4 py-3">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-4">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-blue-600 to-purple-600 flex items-center justify-center shadow-lg shadow-blue-500/20">
              <i class="ph-bold ph-trend-up text-white text-xl"></i>
            </div>
            <div>
              <h1 class="text-xl font-bold tracking-tight">CryptoNews <span class="text-blue-500">Pro</span></h1>
              <p class="text-[10px] text-gray-500 font-mono uppercase">Tempo Real</p>
            </div>
          </div>
          
          <div class="hidden sm:flex items-center gap-2 px-3 py-1.5 bg-gray-800 rounded-full border border-gray-700">
            <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
            <span class="text-xs text-gray-300" x-text="`+${stats.total24h} notícias em 24h`"></span>
          </div>
        </div>

        <div class="flex items-center gap-2">
          <button @click="showSearch = true" class="hidden sm:flex items-center gap-2 px-3 py-2 bg-gray-800 hover:bg-gray-700 rounded-lg text-sm text-gray-400 transition-colors">
            <i class="ph-bold ph-magnifying-glass"></i>
            <span>Buscar...</span>
            <span class="ml-2 px-1.5 py-0.5 bg-gray-700 rounded text-[10px]">Ctrl+K</span>
          </button>
          
          <button @click="view = view === 'feed' ? 'headlines' : 'feed'"
                  class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium transition-all"
                  :class="view === 'headlines' ? 'bg-purple-600 text-white shadow-lg shadow-purple-500/25' : 'bg-gray-800 text-gray-400 hover:bg-gray-700'">
            <i class="ph-bold" :class="view === 'feed' ? 'ph-newspaper' : 'ph-list-dashes'"></i>
            <span x-text="view === 'feed' ? 'Painel IA' : 'Feed'"></span>
          </button>
          
          <button @click="toggleTheme()" class="w-10 h-10 rounded-lg bg-gray-800 hover:bg-gray-700 flex items-center justify-center transition-colors">
            <i class="ph-fill" :class="isDark ? 'ph-moon-stars text-yellow-400' : 'ph-sun text-gray-300'"></i>
          </button>
        </div>
      </div>

      <div x-show="breakingNews" x-transition class="breaking-banner mt-3 rounded-lg px-4 py-2 flex items-center gap-3">
        <i class="ph-fill ph-warning-circle text-white text-lg animate-pulse"></i>
        <span class="text-white font-medium text-sm truncate" x-text="breakingNews"></span>
        <button @click="breakingNews = null" class="ml-auto text-white/80 hover:text-white">
          <i class="ph-bold ph-x"></i>
        </button>
      </div>

      <div x-show="view === 'feed'" x-transition class="flex gap-2 mt-4 overflow-x-auto scrollbar-hide pb-1">
        <template x-for="cat in categories" :key="cat.id">
          <button @click="filters.category = cat.id"
                  class="px-4 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap transition-all border flex items-center gap-1.5"
                  :class="filters.category === cat.id ? cat.activeClass : 'bg-gray-800 text-gray-400 border-gray-700 hover:border-gray-500'">
            <span x-text="cat.icon"></span>
            <span x-text="cat.label"></span>
            <span x-show="cat.count > 0" class="px-1.5 py-0.5 rounded-full text-[10px]" 
                  :class="filters.category === cat.id ? 'bg-white/20' : 'bg-gray-700'"
                  x-text="cat.count"></span>
          </button>
        </template>
      </div>
    </div>
  </header>

  <!-- ================= SEARCH OVERLAY ================= -->
  <div x-show="showSearch" x-cloak class="fixed inset-0 z-[60] bg-black/80 backdrop-blur-sm" @click.self="showSearch = false">
    <div class="max-w-2xl mx-auto mt-20 px-4">
      <div class="bg-gray-900 border border-gray-700 rounded-2xl shadow-2xl overflow-hidden">
        <div class="flex items-center gap-3 px-4 py-3 border-b border-gray-800">
          <i class="ph-bold ph-magnifying-glass text-gray-400"></i>
          <input type="text" x-model="filters.search" @input="searchNews()" 
                 class="flex-1 bg-transparent outline-none text-white placeholder-gray-500"
                 placeholder="Buscar por Bitcoin, Fed, ETF, Trump..."
                 autofocus>
          <button @click="showSearch = false" class="text-gray-400 hover:text-white">
            <i class="ph-bold ph-x"></i>
          </button>
        </div>
        <div class="p-2 max-h-96 overflow-y-auto">
          <template x-if="searchResults.length > 0">
            <div class="space-y-1">
              <template x-for="item in searchResults.slice(0, 10)" :key="item.id">
                <a :href="item.url" target="_blank" 
                   class="flex items-start gap-3 p-3 rounded-lg hover:bg-gray-800 transition-colors group">
                  <div class="w-16 h-16 rounded bg-gray-800 shrink-0 overflow-hidden">
                    <img :src="item.image || 'https://placehold.co/100x100/1f2937/6b7280?text=News'" 
                         class="w-full h-full object-cover" @error="$el.style.display='none'">
                  </div>
                  <div class="flex-1 min-w-0">
                    <h4 class="text-sm font-medium text-gray-100 group-hover:text-blue-400 line-clamp-2" x-text="item.title"></h4>
                    <div class="flex items-center gap-2 mt-1 text-xs text-gray-500">
                      <span x-text="item.source"></span>
                      <span>•</span>
                      <span x-text="timeAgo(item.date)"></span>
                    </div>
                  </div>
                </a>
              </template>
            </div>
          </template>
        </div>
      </div>
    </div>
  </div>

  <!-- ================= MAIN CONTENT ================= -->
  <main class="max-w-7xl mx-auto px-4 py-6 min-h-screen">
    
    <div x-show="loading && news.length === 0" class="flex flex-col items-center justify-center py-20">
      <div class="relative">
        <div class="w-16 h-16 border-4 border-blue-500/30 border-t-blue-500 rounded-full animate-spin"></div>
        <div class="absolute inset-0 flex items-center justify-center">
          <i class="ph-bold ph-arrows-clockwise text-blue-500 animate-pulse"></i>
        </div>
      </div>
      <p class="mt-4 text-gray-400">Sincronizando fontes de notícias...</p>
    </div>

    <div x-show="error && !loading" class="mb-4 p-4 bg-red-500/10 border border-red-500/30 rounded-xl text-red-400 text-sm flex items-start gap-3">
      <i class="ph-bold ph-warning-circle text-lg mt-0.5"></i>
      <div>
        <p x-text="error"></p>
        <button @click="retryFetch()" class="mt-2 text-red-300 hover:text-red-200 text-xs font-medium underline">
          Tentar novamente
        </button>
      </div>
    </div>

    <!-- Trending Section -->
    <div x-show="view === 'feed' && trending.length > 0" class="mb-6">
      <div class="flex items-center gap-2 mb-3">
        <i class="ph-fill ph-fire text-orange-500"></i>
        <h3 class="font-bold text-lg">🔥 Em Alta Agora</h3>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
        <template x-for="(item, idx) in trending" :key="item.id">
          <a :href="item.url" target="_blank" 
             class="group relative bg-gradient-to-br from-gray-900 to-gray-800 border border-gray-700 rounded-xl p-4 hover:border-orange-500/50 transition-all">
            <div class="absolute -top-2 -left-2 w-8 h-8 rounded-full bg-orange-500 flex items-center justify-center text-xs font-bold text-white shadow-lg"
                 x-text="`#${idx + 1}`"></div>
            <div class="flex items-center gap-2 mb-2">
              <span class="px-2 py-0.5 rounded text-[10px] font-bold uppercase" :class="item.categoryColors" x-text="item.categoryLabel"></span>
              <span class="text-xs text-gray-500" x-text="item.source"></span>
            </div>
            <h4 class="font-semibold text-sm text-gray-100 group-hover:text-orange-400 transition-colors line-clamp-2" x-text="item.title"></h4>
            <div class="flex items-center justify-between mt-3 text-xs text-gray-500">
              <span x-text="timeAgo(item.date)"></span>
              <span class="flex items-center gap-1 text-orange-400">
                <i class="ph-fill ph-trend-up"></i>
                <span x-text="item.score"></span>
              </span>
            </div>
          </a>
        </template>
      </div>
    </div>

    <!-- FEED VIEW -->
    <div x-show="view === 'feed'" x-cloak>
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold" x-text="getCategoryLabel(filters.category)"></h2>
        <div class="flex items-center gap-2 text-sm text-gray-500">
          <button @click="refreshNews(true)" :disabled="loading" 
                  class="flex items-center gap-1.5 hover:text-blue-400 transition-colors disabled:opacity-50">
            <i class="ph-bold ph-arrows-clockwise" :class="{'animate-spin': loading}"></i>
            <span x-text="loading ? 'Atualizando...' : 'Atualizar'"></span>
          </button>
          <span>•</span>
          <span>Cache: <span x-text="cacheInfo"></span></span>
        </div>
      </div>

      <div class="grid grid-cols-1 gap-4">
        <template x-for="item in paginatedNews" :key="item.id">
          <article class="group bg-gray-900/40 border border-gray-800 rounded-xl overflow-hidden hover:border-blue-500/50 hover:bg-gray-800/50 transition-all duration-200 fade-in">
            <div class="flex flex-col sm:flex-row">
              <div class="w-full sm:w-52 h-48 sm:h-auto relative shrink-0 bg-gray-800">
                <img :src="item.image || getDefaultImage(item.category)" 
                     class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"
                     @error="$el.parentElement.innerHTML = '<div class=\'w-full h-full flex items-center justify-center bg-gray-800 text-gray-600 text-xs\'><i class=\'ph-bold ph-image mr-1\'></i> Sem imagem</div>'">
                
                <div x-show="item.score >= 12" class="absolute top-3 right-3 bg-orange-500/90 text-white text-[10px] font-bold px-2 py-1 rounded-md flex items-center gap-1 shadow-lg">
                  <i class="ph-fill ph-fire"></i> HOT
                </div>
              </div>
              
              <div class="p-5 flex flex-col justify-between flex-1">
                <div>
                  <div class="flex items-center gap-2 mb-3 flex-wrap">
                    <span class="px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider" :class="item.categoryColors" x-text="item.categoryLabel"></span>
                    <span class="text-gray-500 text-xs flex items-center gap-1">
                      <i class="ph ph-clock"></i>
                      <span x-text="timeAgo(item.date)"></span>
                    </span>
                  </div>

                  <h3 class="text-lg font-bold text-gray-100 group-hover:text-blue-400 transition-colors mb-2 leading-tight"
                      x-text="item.title"></h3>
                  
                  <p x-show="item.desc" class="text-sm text-gray-400 line-clamp-2 mb-4" x-text="item.desc"></p>
                </div>

                <div class="flex items-center justify-between pt-3 border-t border-gray-800/50">
                  <div class="flex items-center gap-3">
                    <span class="text-xs font-medium text-gray-300 flex items-center gap-1">
                      <i class="ph-bold ph-broadcast"></i>
                      <span x-text="item.source"></span>
                    </span>
                  </div>
                  <span class="text-xs text-blue-500 font-medium flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                    Ler original <i class="ph-bold ph-arrow-right"></i>
                  </span>
                </div>
              </div>
            </div>
          </article>
        </template>
      </div>

      <div x-show="totalPages > 1" class="flex items-center justify-center gap-2 mt-6">
        <button @click="currentPage--" :disabled="currentPage === 1" 
                class="px-4 py-2 rounded-lg bg-gray-800 disabled:opacity-50 disabled:cursor-not-allowed hover:bg-gray-700 transition-colors">
          <i class="ph-bold ph-caret-left"></i>
        </button>
        <template x-for="page in getPages()" :key="page">
          <button @click="currentPage = page"
                  class="w-10 h-10 rounded-lg text-sm font-medium transition-colors"
                  :class="currentPage === page ? 'bg-blue-600 text-white' : 'bg-gray-800 text-gray-400 hover:bg-gray-700'"
                  x-text="page"></button>
        </template>
        <button @click="currentPage++" :disabled="currentPage === totalPages"
                class="px-4 py-2 rounded-lg bg-gray-800 disabled:opacity-50 disabled:cursor-not-allowed hover:bg-gray-700 transition-colors">
          <i class="ph-bold ph-caret-right"></i>
        </button>
      </div>

      <div x-show="!loading && filteredNews.length === 0" class="text-center py-16 text-gray-500">
        <i class="ph-duotone ph-newspaper-clipping text-5xl mb-4"></i>
        <p class="text-lg mb-2">Nenhuma notícia encontrada</p>
      </div>
    </div>

    <!-- HEADLINES PANEL -->
    <div x-show="view === 'headlines'" x-cloak class="max-w-4xl mx-auto">
      <div class="flex items-center justify-between mb-6">
        <div>
          <h2 class="text-2xl font-bold text-white mb-1">🤖 Painel de Manchetes para IA</h2>
          <p class="text-sm text-gray-400">Copie títulos otimizados para gerar insights</p>
        </div>
        <button @click="copyHeadlines()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg text-sm font-medium transition-colors">
          Copiar Tudo
        </button>
      </div>
      <div class="bg-gray-900 border border-gray-800 rounded-xl p-4 space-y-2">
        <template x-for="item in news.slice(0, 20)" :key="item.id">
          <div class="flex items-start gap-3 p-3 rounded-lg bg-gray-800/50 hover:bg-gray-800 transition-colors">
            <input type="checkbox" class="mt-1 rounded border-gray-700 bg-gray-800 text-blue-600">
            <div class="flex-1">
              <p class="text-sm text-gray-300" x-text="item.title"></p>
              <p class="text-xs text-gray-500 mt-1" x-text="`${item.source} • ${timeAgo(item.date)}`"></p>
            </div>
          </div>
        </template>
      </div>
    </div>
  </main>

  <script>
    function cryptoNewsApp() {
      return {
        view: 'feed', // ABRE NO FEED POR PADRÃO
        loading: false,
        error: null,
        showSearch: false,
        isDark: true,
        breakingNews: null,
        hasValidKeys: false,
        currentPage: 1,
        itemsPerPage: 10,
        
        apiKeys: {
          newsapi: '',
          cryptopanic: '',
          gemini: ''
        },
        
        stats: {
          total24h: 236
        },
        
        categories: [
          { id: 'all', label: 'Todas', icon: '☰', count: 0, activeClass: 'bg-blue-600 text-white border-blue-500' },
          { id: 'crypto', label: 'Cripto', icon: '₿', count: 0, activeClass: 'bg-yellow-600 text-white border-yellow-500' },
          { id: 'macro', label: 'Macro', icon: '📊', count: 0, activeClass: 'bg-blue-600 text-white border-blue-500' },
          { id: 'politics', label: 'Política', icon: '🏛', count: 0, activeClass: 'bg-red-600 text-white border-red-500' }
        ],
        
        filters: {
          category: 'all',
          search: ''
        },
        
        news: [],
        searchResults: [],
        cacheInfo: '--',
        activeSources: [],
        
        init() {
          this.loadKeys();
          this.fetchNews();
          setInterval(() => this.fetchNews(false), 300000); // Atualiza a cada 5 min
        },
        
        loadKeys() {
          const saved = localStorage.getItem('cryptoNewsKeys');
          if (saved) {
            this.apiKeys = JSON.parse(saved);
            this.hasValidKeys = !!(this.apiKeys.newsapi || this.apiKeys.cryptopanic);
          }
        },
        
        saveKeys() {
          localStorage.setItem('cryptoNewsKeys', JSON.stringify(this.apiKeys));
          this.hasValidKeys = true;
          this.fetchNews();
        },
        
        useDemoMode() {
          this.hasValidKeys = true;
          this.loadDemoData();
        },
        
        loadDemoData() {
          this.news = [
            {
              id: '1',
              title: 'Bitcoin dispara acima de $73.000 após aprovação de ETF spot por BlackRock',
              desc: 'Institucionais entram agressivamente no mercado enquanto Fed sinaliza pausa nos juros',
              category: 'crypto',
              source: 'CoinDesk',
              date: new Date(Date.now() - 1800000).toISOString(),
              url: '#',
              image: 'https://images.unsplash.com/photo-1518546305927-5a555bb7020d?w=400',
              score: 32,
              keywords: ['bitcoin', 'etf']
            },
            {
              id: '2',
              title: 'Fed mantém taxas de juros inalteradas; Powell cita inflação persistente',
              desc: 'Mercados reagem com volatilidade às declarações do presidente do Federal Reserve',
              category: 'macro',
              source: 'Bloomberg',
              date: new Date(Date.now() - 7200000).toISOString(),
              url: '#',
              image: 'https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?w=400',
              score: 15,
              keywords: ['fed', 'juros']
            },
            {
              id: '3',
              title: 'SEC aprova novo framework regulatório para stablecoins nos EUA',
              desc: 'Proposta visa trazer clareza jurídica para emissores de moedas digitais lastreadas',
              category: 'politics',
              source: 'Reuters',
              date: new Date(Date.now() - 14400000).toISOString(),
              url: '#',
              image: 'https://images.unsplash.com/photo-1563986768609-322da13575f3?w=400',
              score: 18,
              keywords: ['sec', 'regulacao']
            },
            {
              id: '4',
              title: 'Ethereum atinge novo recorde de transações diárias na camada 2',
              desc: 'Arbitrum e Optimism lideram crescimento enquanto taxas na mainnet caem',
              category: 'crypto',
              source: 'The Block',
              date: new Date(Date.now() - 3600000).toISOString(),
              url: '#',
              image: 'https://images.unsplash.com/photo-1622630998477-20aa696fa405?w=400',
              score: 22,
              keywords: ['ethereum', 'layer2']
            },
            {
              id: '5',
              title: 'Inflação nos EUA cai para 3.1% em novembro, abaixo do esperado',
              desc: 'Dados reforçam expectativa de corte de juros pelo Fed em 2024',
              category: 'macro',
              source: 'WSJ',
              date: new Date(Date.now() - 18000000).toISOString(),
              url: '#',
              image: 'https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?w=400',
              score: 13,
              keywords: ['inflacao', 'economia']
            }
          ];
          
          this.updateStats();
          this.cacheInfo = new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
        },
        
        async fetchNews(showLoading = true) {
          if (showLoading) this.loading = true;
          this.error = null;
          
          try {
            if (this.apiKeys.newsapi) {
              await this.fetchFromNewsAPI();
            } else if (this.apiKeys.cryptopanic) {
              await this.fetchFromCryptoPanic();
            } else {
              this.loadDemoData();
            }
          } catch (err) {
            this.error = 'Erro ao buscar notícias: ' + err.message;
            console.error(err);
          } finally {
            this.loading = false;
          }
        },
        
        async fetchFromNewsAPI() {
          const queries = ['bitcoin', 'cryptocurrency', 'federal reserve', 'ethereum'];
          const allArticles = [];
          
          for (const q of queries) {
            const url = `https://newsapi.org/v2/everything?q=${q}&language=en&sortBy=publishedAt&pageSize=5&apiKey=${this.apiKeys.newsapi}`;
            const res = await fetch(url);
            const data = await res.json();
            if (data.articles) {
              allArticles.push(...data.articles.map((article, i) => ({
                id: `${q}-${i}-${Date.now()}`,
                title: article.title,
                desc: article.description || '',
                category: this.categorizeNews(q, article.title),
                source: article.source.name,
                date: article.publishedAt,
                url: article.url,
                image: article.urlToImage,
                score: Math.floor(Math.random() * 30) + 5
              })));
            }
          }
          
          this.news = allArticles.sort((a, b) => new Date(b.date) - new Date(a.date));
          this.updateStats();
          this.cacheInfo = new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
        },
        
        async fetchFromCryptoPanic() {
          const url = `https://cryptopanic.com/api/v1/posts/?auth_token=${this.apiKeys.cryptopanic}&kind=news`;
          const res = await fetch(url);
          const data = await res.json();
          
          this.news = data.results.map((post, i) => ({
            id: post.id || `cp-${i}`,
            title: post.title,
            desc: post.body || '',
            category: this.categorizeNews(post.currencies?.[0]?.code || '', post.title),
            source: post.source?.title || 'CryptoPanic',
            date: post.published_at,
            url: post.url,
            image: post.image?.url || null,
            score: post.votes || 0
          }));
          
          this.updateStats();
        },
        
        categorizeNews(keyword, title) {
          const text = (keyword + ' ' + title).toLowerCase();
          if (text.match(/bitcoin|ethereum|crypto|altcoin|defi|nft/)) return 'crypto';
          if (text.match(/fed|inflation|interest|rate|economy|gdp/)) return 'macro';
          if (text.match(/sec|regulation|government|policy|law/)) return 'politics';
          return 'crypto';
        },
        
        updateStats() {
          const now = Date.now();
          const day = 24 * 60 * 60 * 1000;
          this.stats.total24h = this.news.filter(n => (now - new Date(n.date).getTime()) < day).length;
          
          this.categories.forEach(cat => {
            if (cat.id !== 'all') {
              cat.count = this.news.filter(n => n.category === cat.id).length;
            } else {
              cat.count = this.news.length;
            }
          });
        },
        
        get filteredNews() {
          let filtered = this.news;
          
          if (this.filters.category !== 'all') {
            filtered = filtered.filter(n => n.category === this.filters.category);
          }
          
          if (this.filters.search) {
            const s = this.filters.search.toLowerCase();
            filtered = filtered.filter(n => 
              n.title.toLowerCase().includes(s) || 
              (n.desc && n.desc.toLowerCase().includes(s))
            );
          }
          
          return filtered;
        },
        
        get paginatedNews() {
          const start = (this.currentPage - 1) * this.itemsPerPage;
          return this.filteredNews.slice(start, start + this.itemsPerPage);
        },
        
        get trending() {
          return [...this.news]
            .sort((a, b) => b.score - a.score)
            .slice(0, 3);
        },
        
        get totalPages() {
          return Math.ceil(this.filteredNews.length / this.itemsPerPage);
        },
        
        getPages() {
          const pages = [];
          const total = this.totalPages;
          const current = this.currentPage;
          
          for (let i = 1; i <= total; i++) {
            if (i === 1 || i === total || (i >= current - 1 && i <= current + 1)) {
              pages.push(i);
            } else if (pages[pages.length - 1] !== '...') {
              pages.push('...');
            }
          }
          
          return pages;
        },
        
        getCategoryLabel(cat) {
          const c = this.categories.find(c => c.id === cat);
          return c ? c.label : 'Todas';
        },
        
        getDefaultImage(category) {
          const images = {
            crypto: 'https://images.unsplash.com/photo-1518546305927-5a555bb7020d?w=400',
            macro: 'https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?w=400',
            politics: 'https://images.unsplash.com/photo-1563986768609-322da13575f3?w=400'
          };
          return images[category] || images.crypto;
        },
        
        timeAgo(dateString) {
          const date = new Date(dateString);
          const now = new Date();
          const diff = (now - date) / 1000;
          
          if (diff < 60) return 'Agora';
          if (diff < 3600) return `${Math.floor(diff/60)}min`;
          if (diff < 86400) return `${Math.floor(diff/3600)}h`;
          return `${Math.floor(diff/86400)}d`;
        },
        
        searchNews() {
          if (this.filters.search.length < 3) {
            this.searchResults = [];
            return;
          }
          
          const s = this.filters.search.toLowerCase();
          this.searchResults = this.news.filter(n => 
            n.title.toLowerCase().includes(s) || 
            (n.desc && n.desc.toLowerCase().includes(s))
          );
        },
        
        refreshNews(force = false) {
          this.currentPage = 1;
          this.fetchNews(force);
        },
        
        retryFetch() {
          this.fetchNews(true);
        },
        
        toggleTheme() {
          this.isDark = !this.isDark;
          document.documentElement.classList.toggle('dark');
        },
        
        copyHeadlines() {
          const text = this.news.slice(0, 20).map(n => n.title).join('\n');
          navigator.clipboard.writeText(text);
          alert('Manchetes copiadas!');
        }
      }
    }
  </script>
</body>
